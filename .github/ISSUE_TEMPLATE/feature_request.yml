name: Feature request
description: Propose a new audit rule, dashboard view, or pipeline change.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or rough edge motivates this?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: |
        Concrete: API endpoint shape, worker behavior, dashboard view,
        or persistence change.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: impact
    attributes:
      label: Compatibility / migration impact
      description: |
        Mongo schema or index changes, queue payload changes, env var
        renames, breaking API changes.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
