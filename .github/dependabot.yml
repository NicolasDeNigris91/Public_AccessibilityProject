version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: scope
    labels: ["dependencies", "npm"]
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(backend)"
      include: scope
    labels: ["dependencies", "npm", "backend"]
    groups:
      backend-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(frontend)"
      include: scope
    labels: ["dependencies", "npm", "frontend"]
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(docker)"
      include: scope
    labels: ["dependencies", "docker", "backend"]

  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(docker)"
      include: scope
    labels: ["dependencies", "docker", "frontend"]
