name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # mongodb-memory-server downloads the mongod binary (~780 MB) on first
      # use. Cache it so repeat runs skip the download entirely.
      - name: Cache mongodb-memory-server binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-memory-server-${{ runner.os }}

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: backend

      - name: Test
        run: npm test --workspace backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Test
        run: npm test --workspace frontend

      - name: Build
        run: npm run build --workspace frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
